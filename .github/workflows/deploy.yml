name: Yadimen — Inspect then Deploy

on:
  push:
    branches: [main]

jobs:

  inspect:
    name: Code Inspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run inspector
        run: python .github/scripts/inspect.py

  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    needs: inspect
    if: needs.inspect.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Prepare deploy root
        run: |
          cp site/index.html index.html
          cat > .htaccess <<'HTEOF'
          # Force HTTPS first
          RewriteEngine On
          RewriteCond %{HTTPS} off
          RewriteCond %{REQUEST_URI} !^/\.well-known/
          RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
          # Never intercept WordPress core paths
          RewriteCond %{REQUEST_URI} ^/wp- [NC]
          RewriteRule ^ - [L]
          # Never intercept WordPress admin
          RewriteCond %{REQUEST_URI} ^/wp-admin [NC]
          RewriteRule ^ - [L]
          # Serve our static site for all other requests
          DirectoryIndex index.html index.php
          # WordPress fallback
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.php [L]
          HTEOF
          sed -i 's/^          //' .htaccess
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       21
          protocol:   ftp
          local-dir:  ./
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            .gitignore
            OPERATIONS.md
            README.md
            INSPECTION-REPORT.md
            compass/**
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://yadimen.com/data/test.json)
          echo "Health check: HTTP $STATUS"
