name: Yadimen — Inspect then Deploy

on:
  push:
    branches: [main]

jobs:

  inspect:
    name: Code Inspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run inspector
        run: python .github/scripts/inspect.py
      - name: Commit report
        if: always()
        run: |
          git config user.name  "Yadimen CI"
          git config user.email "ci@yadimen.com"
          git add INSPECTION-REPORT.md
          git diff --staged --quiet || git commit -m "ci: inspection report [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest
    needs: inspect
    if: needs.inspect.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:     ${{ secrets.FTP_SERVER }}
          username:   ${{ secrets.FTP_USERNAME }}
          password:   ${{ secrets.FTP_PASSWORD }}
          port:       21
          protocol:   ftp
          local-dir:  ./
          server-dir: /public_html/yadimen-pipeline/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            INSPECTION-REPORT.md
            README.md
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://yadimen.com/yadimen-pipeline/data/test.json)
          echo "Health check: HTTP $STATUS"
